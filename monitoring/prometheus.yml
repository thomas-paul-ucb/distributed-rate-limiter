global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'rate-limiter-app'
    static_configs:
      #- targets: ['host.docker.internal:8000'] # If running app locally via uvicorn
      - targets: ['app:8000']                # If running app inside docker-compose

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']