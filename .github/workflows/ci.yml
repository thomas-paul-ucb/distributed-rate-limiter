name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    # Spin up fresh databases specifically for the CI runner
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
          
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: ratelimiter
        # Map the internal port to the runner's host
        ports:
          - 5432:5432

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # explicitly install testing libraries used in your tests folder
          pip install pytest pytest-asyncio httpx

      - name: Run Tests
        env:
          # Point the app to the GitHub Actions local databases
          REDIS_URL: redis://localhost:6379
          DATABASE_URL: postgresql://postgres:secret@localhost:5432/ratelimiter
          PYTHONPATH: .
        run: pytest tests/ -v